<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedules - Express Bus Services</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">Express<span>Bus</span></div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="schedules.html" class="active">Schedules</a></li>
                    <li><a href="booking.html">Book</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>
    
    <main>
        <section class="page-header">
            <div class="container">
                <h1>Bus Schedules</h1>
                <p>Find the perfect time for your journey</p>
            </div>
        </section>
        
        <section class="schedule-finder">
            <div class="container">
                <div class="booking-card">
                    <h2>Search Schedules</h2>
                    <form id="schedule-form">
                        <div class="form-group">
                            <label for="schedule-from"><i class="fas fa-map-marker-alt"></i> From</label>
                            <select name="schedule-from" id="schedule-from">
                                <option value="">Select Departure</option>
                                <option value="nairobi">Nairobi</option>
                                <option value="mombasa">Mombasa</option>
                                <option value="kisumu">Kisumu</option>
                                <option value="nakuru">Nakuru</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="schedule-to"><i class="fas fa-map-marker"></i> To</label>
                            <select name="schedule-to" id="schedule-to">
                                <option value="">Select Destination</option>
                                <option value="nairobi">Nairobi</option>
                                <option value="mombasa">Mombasa</option>
                                <option value="kisumu">Kisumu</option>
                                <option value="nakuru">Nakuru</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="schedule-date"><i class="far fa-calendar-alt"></i> Date</label>
                            <input type="date" name="schedule-date" id="schedule-date">
                        </div>
                        
                        <button type="submit" class="btn-primary">Find Schedules</button>
                    </form>
                </div>
            </div>
        </section>
        
        <section class="schedule-results">
            <div class="container">
                <h2>Available Routes</h2>
                <div class="schedule-table" id="scheduleTable">
                    <div class="schedule-header">
                        <div class="schedule-cell">Route</div>
                        <div class="schedule-cell">Departure</div>
                        <div class="schedule-cell">Arrival</div>
                        <div class="schedule-cell">Duration</div>
                        <div class="schedule-cell">Price</div>
                        <div class="schedule-cell">Action</div>
                    </div>
                    <!-- Dynamic rows will be inserted here -->
                </div>
            </div>
        </section>
    </main>
    
    <footer id="contact">
        <div class="container">
            <div class="footer-content">
                <div class="logo">Express<span>Bus</span></div>
                <p>&copy; 2025 Express Bus Services. All rights reserved.</p>
            </div>
            <div class="social-icons">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </footer>
    
    <script src="script.js"></script>
    <script>
        document.getElementById('schedule-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const from = document.getElementById('schedule-from').value;
            const to = document.getElementById('schedule-to').value;
            const date = document.getElementById('schedule-date').value;

            const response = await fetch('http://localhost/ExpressBus/api/get_routes.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ from, to, date })
            });

            const routes = await response.json();
            const scheduleTable = document.getElementById('scheduleTable');

            // Clear existing rows
            scheduleTable.querySelectorAll('.schedule-row').forEach(row => row.remove());

            // Populate table with fetched routes
            routes.forEach(route => {
                const row = document.createElement('div');
                row.classList.add('schedule-row');
                row.innerHTML = `
                    <div class="schedule-cell">
                        <div class="route">${route.from} to ${route.to}</div>
                        <div class="bus-type">${route.bus_type}</div>
                    </div>
                    <div class="schedule-cell">
                        <div class="time">${route.departure_time}</div>
                        <div class="date">${route.departure_date}</div>
                    </div>
                    <div class="schedule-cell">
                        <div class="time">${route.arrival_time}</div>
                        <div class="date">${route.arrival_date}</div>
                    </div>
                    <div class="schedule-cell">${route.duration}</div>
                    <div class="schedule-cell">KES ${route.price}</div>
                    <div class="schedule-cell">
                        <a href="booking.html?route_id=${route.id}" class="btn-secondary">Book Now</a>
                    </div>
                `;
                scheduleTable.appendChild(row);
            });
        });
    </script>
</body>
</html>
